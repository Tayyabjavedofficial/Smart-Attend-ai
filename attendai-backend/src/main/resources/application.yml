spring:
  application:
    name: attendai-backend
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # SMTP for password-reset emails. All values overridable via SPRING_MAIL_* env
  # vars on the deployed Space. Defaults assume Gmail SMTP.
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:change-me-this-is-a-development-only-secret-do-not-use-in-production-please}
    access-token-expiration-ms: 900000      # 15 minutes
    refresh-token-expiration-ms: 604800000  # 7 days
    issuer: attendai
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  ai:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
    service-key: ${AI_SERVICE_KEY:dev-service-key}
    timeout-seconds: 10
    # Set to false once the Python FastAPI AI service is running.
    use-stub: ${AI_USE_STUB:true}
  attendance:
    default-challenge-duration-seconds: 60
    minimum-percentage: 75
    risk-thresholds:
      low: 30
      medium: 60
      high: 80
  password-reset:
    # Where the email's "reset link" points. Frontend reads ?token=... from URL.
    reset-url-base: ${APP_RESET_URL_BASE:http://localhost:3000/reset-password}
    token-expiration-minutes: ${APP_RESET_TOKEN_EXPIRATION_MINUTES:30}
    # From: address on the outbound mail. For Gmail SMTP this must match
    # SPRING_MAIL_USERNAME or be a verified alias on that account.
    mail-from: ${APP_RESET_MAIL_FROM:no-reply@attendai.local}
  geofence:
    # Campus centre for location-verified attendance (Computer Science block).
    latitude: ${APP_GEOFENCE_LAT:34.06816}
    longitude: ${APP_GEOFENCE_LNG:73.14945}
    radius-meters: ${APP_GEOFENCE_RADIUS_METERS:50}
    # Extra slack added to the radius to absorb GPS inaccuracy (esp. indoors).
    accuracy-buffer-meters: ${APP_GEOFENCE_BUFFER_METERS:80}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.attendai: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
